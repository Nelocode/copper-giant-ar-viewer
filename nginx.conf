server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/javascript application/javascript
                    application/json application/xml image/svg+xml;

    # Cache de assets estáticos
    location ~* \.(css|js|glb|gltf|png|jpg|jpeg|webp|svg|ico|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        add_header  Access-Control-Allow-Origin "*";
    }

    # GLB/GLTF necesitan las cabeceras CORS para que model-viewer los cargue
    location ~* \.(glb|gltf)$ {
        add_header  Access-Control-Allow-Origin "*";
        add_header  Content-Type "model/gltf-binary";
    }

    # HTTPS requerido para WebXR / AR — se gestiona en EasyPanel (reverse proxy)
    # Aquí solo añadimos las cabeceras de seguridad mínimas
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin" always;

    # SPA fallback (aunque es una sola página, por si acaso)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check para EasyPanel
    location /health {
        access_log  off;
        return 200  "ok\n";
        add_header  Content-Type text/plain;
    }
}
